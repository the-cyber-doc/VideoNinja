services:
  app:
    build: .
    container_name: videoninja
    ports:
      - "8000:8000"
    volumes:
      - videoninja_uploads:/app/uploads
      - videoninja_output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
      # Subpath where the app is mounted behind a reverse proxy, e.g. /videoninja
      # Leave empty when serving from the domain root.
      - ROOT_PATH=${ROOT_PATH:-}
    restart: unless-stopped

volumes:
  videoninja_uploads:
    driver: local
  videoninja_output:
    driver: local
