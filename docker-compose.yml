services:
  app:
    build: .
    container_name: videoninja
    ports:
      - "8000:8000"
    volumes:
      - videoninja_uploads:/app/uploads
      - videoninja_output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  videoninja_uploads:
    driver: local
  videoninja_output:
    driver: local
